[platformio]
default_envs = diagnostic

; --- Diagnostika (I2C scan) — pouzij toto nejdrive ---
[env:diagnostic]
platform = raspberrypi
board = rpipico
framework = arduino
monitor_speed = 115200
upload_protocol = picotool
src_dir = src_diag

; --- Hlavni firmware ---
[env:rpipico]
platform = raspberrypi
board = rpipico
framework = arduino
monitor_speed = 115200
upload_protocol = picotool
src_dir = src
lib_deps =
    wollewald/ADS1115_WE@^1.4.4
build_flags =
    -DCORE_DEBUG_LEVEL=0
