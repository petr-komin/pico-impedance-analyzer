[platformio]
default_envs = diagnostic

; --- Diagnostika (I2C scan) — pouzij toto nejdrive ---
[env:diagnostic]
platform = raspberrypi
board = pico
framework = arduino
monitor_speed = 115200
upload_protocol = picotool
build_src_filter = -<*> +<../src_diag/>
lib_deps =
    wollewald/ADS1115_WE@^1.4.4

; --- Hlavni firmware ---
[env:main]
platform = raspberrypi
board = pico
framework = arduino
monitor_speed = 115200
upload_protocol = picotool
lib_deps =
    wollewald/ADS1115_WE@^1.4.4
build_flags =
    -DCORE_DEBUG_LEVEL=0
